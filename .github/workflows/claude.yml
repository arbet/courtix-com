name: Claude auto-dispatch

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-dispatch:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You have been dispatched to work on issue #${{ github.event.issue.number }}.
            Read the issue title, body, and comments. Follow CLAUDE.md if present.
            Create a branch named claude/<short-description> and implement the change.
            The Next.js app lives in `web/`. Run `pnpm typecheck` from inside
            `web/` after changes to catch type errors.

            Open the pull request even if the work is incomplete — list any remaining
            TODOs in the PR description so iteration can continue via `@claude` comments.
            Prioritize getting a PR open over finishing every detail in one pass.

            If the task is fundamentally ambiguous, comment on the issue asking for
            clarification instead of guessing.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 120
            --allowed-tools "Bash,Edit,Write,Read,Grep,Glob,WebFetch"

  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-7
            --max-turns 120
            --allowed-tools "Bash,Edit,Write,Read,Grep,Glob,WebFetch"
